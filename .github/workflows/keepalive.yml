name: HF Space Keep-Alive
on:
  schedule:
    - cron: '*/10 6-20 * * 1-6'  # Every 10 min, 6am-8pm, Mon-Sat
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          # Use your actual space URL here
          curl -f ${{ secrets.HF_SPACE_URL }}/health || exit 1
